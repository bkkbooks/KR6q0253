body:
  text: 金臺仁慈沙門性福編集法眼問覺上座船來陸來就事藏鋒覺云船來因事而行眼云船在甚麼處見無縫罅難辨復追覺云船在河裏始終穩密不露其蹤覺退眼問傍僧云你道適來這僧具眼不具眼指彼驗此主意探竿在手旨明平常無生總結今時一色水不洗水金不博金各當本體何洗何賻昧毛色而得馬道本在心非可物求駿本在力非可相取靡絲絃而樂琴既得琴趣何用絃聲若達妙旨何必口揚結繩畫卦有許事喪盡真淳盤古心盤古之時未有八卦契書故曰真淳今之佛法世法交布天下人心轉乖道德轉遠故曰喪盡曹山問德上座佛真法身猶若虗空應物現形如水中月作麼生説個應底道理法身如空本無其相應物如水無形不現人之皆説如何應現德云如驢覷井正合其旨山云道則太煞道只道得八成合問存見一點二拈德云和尚又如何我已八成如何具足山云如井驢一截直領主意探竿在手旨明以見遣見總結權衡在手驢井井驢智容無外其僧偏中現正故曰智容淨涵有餘師乃正中現偏故曰淨涵肘後誰分印道本自道何有相共印乃自得何人能分家中不蓄書天生現成何借詩書機絲不挂梭頭事文彩縱橫意自殊機梭不挂經緯方顯巧婦文彩體用不干凡聖方見本分家風黃檗示衆云汝等諸人盡是噇酒糟漢與麼行腳何處有今日迷名滯相如酒所困如此行持何年得醒還知大唐國裏無禪師麼人境俱奪意要直領僧云只如諸方匡徒領衆又作麼生既無佛法何用開堂檗云不道無禪只是無師既是無師盡是杜撰主意搜短為長旨明垂釣為人總結權衡在手岐分三賢十聖如失羊人岐路之中更有岐路絲染人性本淨反習其餘如絲受染豈不喪本太勞勞失自從他豈非屈曲葉綴花聯敗祖曹不達本分外受必喪妙握司南造化柄黃檗直指如黃帝指定尤令其直捉水雲器具在甄陶道之未通今乃開通如禹王之開河業之未成今之令成如紅爐之煉器屏割繁碎剪除氄毛五宗三藏皆是繁氄今之黃檗盡情剪割星衡稱分輕重藻鑑鏡辨妍玉尺度其長短金刀剪其曲直四事皆言其僧具眼一無錯謬黃檗老察秋毫此僧善具其眼黃檗亦不瞞盰如離朱百步辨秋毫坐斷春風不放高黃檗末後不放這僧出頭任爾眼目清明亦乃坐斷雲巖問道吾大悲菩薩用許多手眼作麼疑經之言吾云如人夜間背手摸枕子手上無眼深夜識枕巖云我會也悟理非根吾云汝作麼生會審他見處巖云遍身是手眼渾然一理更無有雜吾云道即太煞道只道得八成悟則甚的又在大功巖云師兄作麼生恐有不諦故求深進吾云通身是手眼就機一拈以見遣見主意隔身點注旨明渾然不二總結老婆心切一竅虗通一理虗通十方廓然八面玲瓏剎塵沙界無不通融無象無私春入律氣乃無形十虗充滿理乃廓然十界彌綸不留不礙月行空月之行空往返無拘道之應世放收自如清淨寶目功德臂目之清明無所不見臂之功能有至皆擕遍身何似通身是悟於遍身有執其功拈於通身直截至位現前手眼顯全機人人手眼俱全何論通身遍身大用縱橫何忌諱倘肯直下何有彼此雪峰在德山作飯頭一日飯遲德山托鉢至法堂大用為驗峰云這老漢鐘未鳴鼓未響托鉢向什麼處去就事一拶山便歸方丈截斷衆流當央直示峰舉似巖頭自見未決不免相窮頭云大小德山不會末後句當頭一點山聞令侍者喚巖頭問汝不肯老僧那鈎錐在手巖密啓前意敘其來情山乃休去陷虎出身至明日升堂果與尋常不同收放自由巖撫掌笑云且喜老漢會末後句他後天下人不奈伊何大用親呈一出身二蓋覆主意全提大用旨明隔身拈弄總結父子唱和末後句會也無天童先徵你還會麼德山父子太含糊德山盡力不能顯示巖頭盡力不能歌揚此言末後句極是難説故曰太煞含胡座中亦有江南客莫向人前唱鷓鴣就鄭谷詩點他父子不須馳騁盡被看破密師伯與洞山行見白兔子面前走過物密云俊哉誇他無物不具其正山云作麼生審其來由密云如白衣拜相相有其位白衣無職注上之機偏中得正山云老老大大作這個語話直饒偏中得正也是外紹故拈密云你作麼生抑己追他山云積代簪纓暫時落薄道本現成昧之如失聖本尊貴失之如賤主意拈情旨明不落總結正偏互換抗力雪霜雪不變松緣不變道平步雲霄因物有悟如庶得職下惠黜國暫時落薄相如過橋白衣受職蕭曹謀略能成漢偏中立正巢許身心欲避堯平懷常實寵辱若驚深自信真情參迹混漁樵密老之寵又如相如洞山之辱又如下惠有寵有辱總在謀略之中無寵無辱平懷漁樵之內天童拈他二家之情不如平懷嚴陽尊者問趙州一物不將來時如何誇功呈解州云放下著拈他執其無物之情嚴云一物不將來放下個什麼疑無無放故乃復追州云恁麼則擔取去汝若不放只故擔著主意拈情旨明點罰總結權衡在手不妨行細輸先手僧之粗心開口早失趙老行細未舉先知自覺心粗愧撞頭如乎下棋早輸先著再尋出路展轉無門局破腰間斧柯爛倘去大功猶存無功如乎介甫衣袂隨風又迷其家洗清凡骨共仙遊洗清凡骨可共仙遊去却無功方見趙州金剛經云若為人輕賤是人先世罪業應墮惡道以今世人輕賤故迷己從緣十界皆為輕賤先世罪業則為消滅忽悟天真何事不畢主意舉權明實旨明幻盡覺圓總結直下明宗綴綴功過只求其功不知其過膠膠因果執因執果膠粘不捨鏡外狂奔演若多迷心逐法又如若多杖頭擊著破竈墮竈墮破來相賀却道從前辜負我受業之苦如神困竈業消竈墮不妨懡㦬僧問青林虔禪師學人徑往時如何誇功呈解林云死蛇當大路勸子莫當頭當頭犯功死人知見僧云當頭時如何似疑更審林云喪子性命若住於此喪失大命僧云不當頭時如何欲出復追林云亦無回避別尋不可僧云正當恁麼時如何不取二邊直下如何林云失却了也恐住於無故點其失僧云未審向甚麼處去不住於無更向何處林云草深無覓處總是葛藤不可尋逐僧云和尚也須隄防始得悟非葛藤方乃據令林撫掌云一等是個毒氣見他據令就令一點主意回互二邊旨明借事傍通總結老婆心切三老暗轉柁孤舟夜回頭死水不停往來何礙蘆花兩岸雪標其一色煙水一江秋指其澄源風力扶帆行不棹笛聲喚月下滄洲不住一色澄源上下左右隨宜劉鐵磨到溈山山云老牸牛汝來也點他動落今時磨云來日臺山大會齋和尚還去麼隔身反點靜沉死水山放身臥截斷兩頭磨便出回互不犯主意見機而作旨明作家相見總結心幸百戰功成老太平二人作家行止無殊優柔誰肯苦爭衡得和且和玉鞭金馬間終日明月清風富一生滿懷風月無不具足僧問乾峰十方婆伽梵一路涅槃門未審路頭在什麼處疑經求決峰以杖一畫云在這裏大用一提僧問雲門門云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼恐沉死水拈轉其見法法全彰何定一旨主意互相提接旨明不住二邊總結體用互興入手還將死馬醫直饒峰處入手亦是百尺竿頭門乃拈轉其情令悟剎塵為醫反魂香欲起君危一期拶出通身汗方信儂家不惜眉乾峰令絶雲門令蘇忽然死中得活便是百脈通和方知乾峰雲門之慈米胡和尚令僧問仰山今時人還假悟否須悟此旨更勘諸方山云悟即不無爭奈落第二頭何迷悟凡聖不出今時一點二拈胡深肯之契證無差主意探竿在手旨明勘同諸方總結大功不宰第二頭分悟破迷快須撒手捨筌迷悟之法皆是方便得魚捨筌得兔捨功兮未盡成胼拇若存大功如第六指有何用處智也難智覺噬臍向上之妙智覺不及如口齧臍兔老氷盤秋露泣鳥寒玉樹曉風棲兔老月圓明功之圓氷盤玉樹二明一色秋露風棲明及盡今時總名大功外紹持來大仰辨真假痕玷渾無貴白圭持此大功而來較勘如將白玉來辨高低若無瑕玷方是本分破權顯實趙州問投子大死底人却活時如何呈機驗主子云不許夜行投明須到已見來情故乃拈之主意探竿旨明拈情總結是精識精芥城劫石妙窮初芥城劫石皆四十里芥石一盡方名一劫盡是大功更明未有之先方見空劫之妙活眼寰中照廓虗此言趙州出功孤危平實却來諸方辨驗孤危平實不許夜行投曉到孤危平實總是夜行出過二邊始是大明家音未肯付鴻魚投子家音幸有分付如文姬蘇武之書傳趙州得見投子玄用如得鴻魚方知的細子昭首座問法眼和尚開堂承嗣何人知而故問眼云地藏直供昭云太辜負長慶老師何背師恩眼云某甲不會長慶一轉語不通其旨豈肯糢糊昭云何不問還以舊情眼云萬象之中獨露身意作麼生將舊驗舊昭豎拂子以舊呈舊眼云此是長慶學得底首座分上作麼生撥舊追新昭無對忙然失所眼云只如萬象之中獨露身是撥萬象不撥萬象撥則真妄兩分不撥是非混然故拈兩路看他來徑昭云不撥供他不分不知逐句眼云兩個點逐其句亦辨後見參隨左右皆云撥萬象一例逐句眼云萬象之中獨露身𠰚收前發後當央直示主意直截根源旨明大用全提總結搜短為長離念見佛破塵出經未得分明須撥萬象現成家法誰立門庭已得分明了然不撥月逐舟行江練淨春隨草上燒痕青月之是一無水不現春之是一無草不彰此頌萬象獨露一身撥不撥聽叮嚀囑之切忌逐其兩頭三徑就荒歸便得舊時松菊尚芳馨首座閉塞道路法眼與他開通但肯回心舊情如故似乎蔣詡仲求仲從之交遊僧問首山如何是佛山云新婦騎驢阿家牽當央直指主意直下明宗旨明無有意路總結信手拈來新婦騎驢阿家牽拈案體段風流得自然言他答得自然更無些子造作堪笑效顰鄰舍女向人添醜不成妍耳口之徒也要從容中道爭奈臨時取捨無路如乎醜女去學美人之哭只知笑人不知增醜僧問九峰如何是頭頭即今時峰云開眼不覺曉偏不見偏僧云如何是尾末後一著峰云不坐萬年床正不住正僧云有頭無尾是如何一向今時峰云終是不貴奴兒婢子僧云有尾無頭是如何一向劫外峰云雖飽無力自尊自貴僧云頭尾相稱是如何體用俱備峰云兒孫得力室內不知高低普應故曰得力本來尊貴故曰不知主意體用互興旨明五位各顯總結周遍含容規圓體之飽也矩方用之全也用行不居正位隨緣赴感含藏不住偏方謙𢍉自處鈍置棲蘆之鳥執功墮位戀小失大進退觸藩之羊執法迷宗喪本逐末喫人家飯徒誇句下精通臥自家床枉守言前薦得雲騰致雨須不守正出則乍興露結為霜須不戀偏入則乍廢玉線相投透針鼻金針玉線只明貫通免其披離錦絲不斷吐梭腸玉機金梭打成一片免其碎雜石女機停兮夜色向午機停向午不住偏方木人路轉兮月影移央路轉移央不居正位欲得相應停機處路轉移央處向午使其正偏交互出入縱橫八面應赴無拘十方歸行自在華嚴經云我今普見一切衆生具有如來智慧德相本來面目十界不二福智有殊受用各別但以妄想因妄有業因業有報執著著相執相各隨所見而不證得一逐外境本相自迷五十五位列列差殊三十二相件件分離世出世間妄執不了主意凡聖一源旨明真妄各異總結迷己逐緣天蓋地載成團作塊會得上句一切渾然周法界而無邊於大無大何邊之有柝鄰虗而無內於小無小何內之有及盡玄微誰分向背既無大小內外何分你我向背佛祖來償口業債三藏五宗佛祖無端故曰口債問取南方王老師人人只喫一莖菜天童先言一切具有又恐不證故取王老杉山之示須要親到此地方可僧問夾山撥塵見佛時如何脫妄明真特來呈解山云直須揮劍若不揮劍漁父棲巢巢之在樹樹去無依恐住竿頭故喻拈之僧問石霜撥塵見佛時如何霜云渠無國土何處逢渠佛本非他何有其見心本無所何有其逢僧回舉似夾山山乃上堂舉了云門庭施設不如老僧入理深談猶較石霜百步出身蓋覆主意大功不宰旨明不落階級總結向上拂牛劍氣夾山如武王伐紂洗兵威石霜如雨洗武王兵定石霜安寧亂夾山造作歸功更是誰天童雙收二老之見問你諸人更是其誰一旦氛埃清四海垂衣皇化自無為須依夾山揮劍及盡今時然後方見石霜垂衣皇化南泉示衆云三世諸佛不知有本來尊貴黧奴白牯却知有在偏忘偏渴飲飢餐主意大忘人世旨明如愚若啞總結在凡不減在聖不增跛跛足瘸非行挈挈手瘸非運㲯㲯毿毿毛長絶威百不可取一無所堪蓋世無用默默自知心地穩騰騰誰謂肚皮憨普周沙界渾成飯鼻孔纍垂信飽參既到平實廓周無二只知餐飲更無別念進山主問修山主云明知生不生性為什麼為生之所留生即是情不生是性情性兩明因何昧性從情修云笋畢竟成竹如今作篾使還得麼笋力未充待時方用道力未充養久方純進云汝向後自悟去在見他沉情大失本分修云某只如此上座如何不準反追進云這個是監院房那個是典座房當央直指修禮拜知過故謝主意探竿旨明直指總結權衡在手豁落忘依高間不羈於法無情在世無礙家邦平貼到人稀些些力量分階級須然乎帖幾人能到本乎一理妄分情性蕩蕩身心絶是非法法無餘何有彼此是非絶介立大方無軌轍此絶亦絶大方絶待翠岩示衆云一夏已來為兄弟説話看翠岩眉毛在麼探竿在手保福云作賊人心虗就身打劫長慶云生也䶗粗齧細雲門云關一點一拈主意垂釣旨明藏鋒總結作家唱和作賊心過人膽善有機謀翠岩奪最歷歷縱橫對機感三子之才縱橫無礙保福雲門也垂鼻欺唇二人皆有衲僧鼻孔翠岩長慶也修眉過眼二人皆有衲僧眼目杜禪和有何限剛道意句一齊剗一夏妄生穿鑿于今一切掃却埋沒自己也飲氣吞聲帶纍先宗也面墻擔板若作此見非唯埋沒自己亦乃帶纍先宗仰山問中邑如何是佛性義辨主邑云我與你説個譬喻如室有六中安一獼猴外有人喚狌狌獼猴即應如是六窗俱喚俱應表六根猴表六識見山之幼故如此示仰云只如獼猴睡時又作麼生見其逗一點一拶邑下禪床把手云狌狌我與你相見大用全提主意探竿旨明大用總結作家相見凍眠雪屋歲摧頽窈窕蘿門夜不開中邑把住不放如乎大雪封門至夜不開故曰凍眠寒稿園林看變態中邑顯其大用如死發活春風吹起律筒灰不妨仰山春風吹起僧問曹山靈衣不挂時如何得道不忘如喪考妣今乃知非不執法見故曰不挂山云曹山今日孝滿法執已盡如乎孝滿僧云孝滿後如何更追後用山云曹山好顛酒法執既盡無不風流主意以見遣見旨明大功不宰總結不落階級清白門庭四絶鄰長年關掃不容塵及盡今時把定不放光明轉處傾殘月不執幽寂萬物全彰爻象分時却建寅日至寅天之將明月建寅時之逢春二象爻分日明春暖此明絶後再蘇十方無礙新孝滿便逢春孝滿禮之無拘逢春氣之融通醉步狂歌任墮巾散髮夷猶誰管係太平無事酒顛人君臣道合理事俱忘一律平符了無忌諱僧問法眼承教有言從無住本立一切法如何是無住本本非諸法能生諸法眼云形興未質名起未名形興名起從體法用未質未名攝用歸體主意直注旨明兼帶總結體用交互沒蹤迹斷消息明無住本白雲無根清風何色雲之絶迹風之絶色天童之巧比興相通散乾蓋而非心持坤輿而有力雲之能澤萬物生焉風之能持萬物育焉借明立法洞千古之淵源造萬象之模則體用雙呈通貫前後剎塵道會也處處普賢會之一切即一剎塵只在普賢樓閣門開也頭頭彌勒開之一即一切樓閣全彰彌勒瑞巖問巖頭如何是本常理尋常本理頭云動也一點二提巖云動時如何失見返追頭云不見本常理就中一指岩佇思迷宗失路頭云肯即未脫根塵肯即是情所言難脫不肯永沉生死既背妙明生死安出主意急處一提旨明句裏呈機總結老婆心切圓珠不穴大璞不琢本常之理如珠如璞道人所貴無稜角世法佛法如角崢嶸拈却肯路根塵空肯即是能根塵是所能之一絶所自無安脫體無依活卓卓十八界空一真孤顯首山示衆云第一句薦得與佛祖為師一是無極之本何有凡聖之名第二句薦得與人天為師二是對待之機主賓交參之用第三句薦得自救不了出口入耳有何用處僧云和尚是第幾句薦得山云月落三更穿市過當央直指主意垂釣旨明絶待總結破權顯實佛祖髑髏穿一串宮漏沉沉密傳箭向上之人出過佛祖可傳心印如乎宮漏密定時候人天機要發千鈞雲陳輝輝急飛電第二門中示其大機如乎電光不容眨眼個中人看轉變遇賤則貴貴則賤賤則今時貴則劫外見機而作宛轉隨宜得珠罔象兮至道綿綿答處綿綿如乎罔象遊刃亡羊兮赤心片片盡心吐出如牛剖腹僧問仰山和尚還識字否探竿在手山云隨分影草隨身僧乃右旋一匝云是什麼字大用為驗山於地上書一十字大用相酬僧左旋一匝云是什麼字山改十字為卍字僧畫一圓相以兩手托如修羅掌日月勢云是什麼字山畫一圓相圍却卍字僧作樓至勢山云如是如是善自護持賓主之機總明大用主意當央直示旨明大用全提總結作家相見道環之虗靡盈這僧道滿環虗杳然無相可比空印之字未形仰山如印印空文彩十分難辨妙運天輪地軸天左轉地右轉明僧左右兩匝密羅武緯文經文為經武為緯交織成錦明山十字卍字了無空缺放開揑聚山之收放獨立周行僧之施為機發玄樞兮青天激電眼含紫光兮白日見星二人之妙具乎不測如空閃電眼目清明直教陪中看出僧問雲門如何是超佛越祖之談請益門云糊餅當央直指主意拈轉話頭旨明無有意路總結直下明宗糊餅云超佛祖談問處壁立萬仞答處當央直指句中無味若為參句絶言思衲僧一日如知飽方見雲門面不慚若會糊餅方見佛祖無超非見雲門不羞亦不辜負自己長沙令僧問會和尚未見南泉時如何故去探會良久當央直示僧云見後如何徹底相窮會云不可別有把定死蛇更無動轉僧回舉似長沙沙云百尺竿頭坐底人雖然得入未為真法身為極故喻竿頭執法成功失自尊貴百尺竿頭須進步十方沙界是全身不執法身十界任緣僧云百尺竿頭如何進步聞訓故追沙云朗州山澧州水當央直指僧云不會直供沙云四海五湖王化裏注上之機一切渾然主意探竿在手旨明大功不宰總結不落二邊玉人夢破一聲雞轉盻生涯色色齊玉人者一色也即涅槃心忽爾蘇回萬別千差無不全身有信風雷催出蟄如蟲在穴信乎春雷無有不出無言桃李自成蹊無情草木尚爾春蘇何況靈賢而不反覺及時節力耕犁誰怕春疇沒脛泥時窮三際處遍十方事事物物無不當然龍牙問翠微如何是祖師西來意請益微云與我過禪板來句裏呈機牙取禪板與微半醉半醒不知蹉過微接得便打大用全提牙云打即任打要且無祖師西來意空受痛棒不領大旨強作主宰反言無意又問臨濟如何是祖師西來意濟云與我過蒲團來牙取蒲團與濟濟接得蒲團便打牙云打即任打要且無祖師西來意行德同前主意明宗旨明大用總結正令全提蒲團禪板對龍牙二師之用何事當機不作家一不領旨二不能用未意成褫明目下成就結果盡在目下貪向外求故失當央恐將流落在天涯現在不領又怕喪失虗空那挂劍點他妄作星漢却浮槎逢之不識識之不逢如乎張騫誤見牛斗不萌草解藏香象不存一法能含大用無底藍能著活蛇不受一塵故曰無底能顯全機故曰活蛇今日江湖何障礙通方津渡有船車見出羣機在世無礙如乎江河自有船渡玄沙到蒲田縣百戲迎之敬之甚重次日問小塘長老昨日許多喧閙向甚麼處去動中有失故乃探小塘提起袈裟角當央直示沙云料掉沒交涉靜中有失故點故拈主意探竿在手旨明不落二邊總結拈情夜壑藏舟小塘之住澄源著棹玄沙令起龍魚未知水為命動不覺動折筯不妨聊一攪一攪令知玄沙師小塘老函蓋箭鋒探竿影草二師之用甚有作略潛縮也老龜巢蓮小塘把住中放行無迹處不藏遊戲也華鱗弄藻玄沙放行中把住藏身處無迹雲門云聞聲悟道見色明心聲色和道從緣悟旨觀音菩薩將錢來買糊餅放下却是饅頭先示其功明體後示無功明用主意不落二邊旨明垂釣為人總結拈情出門躍馬掃攙搶攙搶者乃妖星也外絶六塵萬國煙塵自肅清六塵脫落六根自淨十二處忘間影響根塵脫落六識自忘三千界放淨光明十八界空神光塞宇溈山問道吾甚處來平常一探吾云看病來就事一呈山云有幾人病就事一拶吾云有病者不病者不可一例山云不病者莫是智頭陀麼就許陷他吾云病與不病總不于他事速道正偏雙奪就見一拶山云道得也與他沒交涉以計截計主意探竿在手旨明以見遣見總結作家相見妙藥何曾過口神醫莫能捉手藥不能治手不能疹病非世病若存也𠍲本非無心之若存不可言無至虗也𠍲本非有心之至虛不可言有不滅而生不亡而壽滅之不滅故曰長生生之不生故曰長壽全超威音之前未有先有獨步劫空之後已壞不壞成平也天蓋地擎在靜無靜運轉也烏飛兔走在動無動俱胝和尚凡有所問只豎一指當央直示主意覿親呈旨明大用現前總結一切即一俱胝老子指頭禪三十年來用不殘一生為人更無更改信有道人方外術須是一指盡凡盡聖了無欲物眼前看盡今盡古絶毫絶釐所得甚簡得之甚少施設彌寬用之甚浩大千剎海飲毫端十界之廣無出一指鱗龍無限落誰手珍重任公把釣竿四海龍魚盡在俱胝天童之手師復豎起一指云看且道是釣竿是示現肅宗帝問忠國師百年後所須何物仁義之問師云與老僧作個無縫塔有縫今時無縫實際帝曰請師塔樣就機一拶師良久全身直示會麼恐失復追帝曰不會實供師云吾有付法弟子耽源却諳此事請詔問之一囑二薦師遷化後帝詔耽源問此意如何源云湘之南談之北雖不存意暗拈二邊中有黃金充一國盡力傍通無影樹下合同船琉璃殿上無知識對上良久不墮偏方不居正位主意當央直示旨明不落階級總結一呈一注孤逈逈圓陀陀孤絶其倫圓無縫罅眼力盡處高峩峩非見可及月落潭空夜色重心境雙絶雲收山瘦秋容多無遮獨露八卦位正五行氣和十方無忌隨緣任用身先在裏見來麼人皆在內你還見否南陽父子兮恰似知有父子之美不犯當頭西竺佛祖兮無如奈何本無巴鼻豈敢強言臨濟問黃檗如何是佛法的的大意請益檗便打全提大用如是三度為法忘軀乃辭檗見大愚愚問甚麼處來探竿濟云黃檗來直供愚云黃檗有何言句指彼驗此濟云某三問佛法的的大意三度喫棒不知有過無過逐句迷愚云黃檗恁麼老婆為你得徹困在盡心盡力無能分解婆心尚困更來問有過無過責他背德濟於言下大悟因此之提忽悟師指主意直示旨明大用總結作家共示九包之雛千里之駒大有神俊力之不充真風度籥三度之棒如風入籥靈機發樞忽悟大智如機發樞劈面來時飛電急掌擘拳愚神機不測迷雲破處太陽孤一念頓絶十分炳煥捋虎鬚見也無才然得悟便具全機個是雄雄大丈夫策其後昆成皆如濟疏山到溈山便問承師有言有句無句如藤倚樹忽然樹倒藤枯句歸何處樹比其心藤比其法心樹已絶法藤何立山呵呵大笑大用直示疏云某四千里賣布單來和尚何得相弄一日打鋪一遭豈是我賣被蓋千里來訪何以為戲溈喚侍者隔身大用取錢還這上座既失當央不免點罰囑云向後有獨眼龍為子點破去在勿則且止後有獨眼於子指明後到明昭舉前話今決前情昭云溈山可謂頭正尾正只是不遇知音分明問答無差不遇良材空嘆疏復問樹倒藤枯句歸何處逐句反追昭云更使溈山笑轉新一點二拈以直指見疏方有悟云溈山元來笑裏有刀承此悟彼方知辜負主意當央直示旨明大用全提總結見機而用藤枯樹倒問溈山大笑呵呵豈等間問處絶相答處絶情笑裏有刀窺得破言思無路絶機關會得此笑凡聖路窮楞嚴經云吾不見時何不見吾不見之處我不見物何不見我不見物處若見不見自然非彼不見之相見我不見物處此見非對物有見非物有離物存見若不見吾不見之地自然非物云何非汝見我不見之地自然無見見尚無迹不汝而誰主意直明向上旨明雙離物見總結人境俱奪滄海瀝乾絶之本無太虗充滿蘇之本有衲僧鼻孔長只可自知古佛舌頭短非言可及珠絲度九曲屈曲於人貫通如穿珠之絲蟻玉機才一轉只明向上之玄如有經而無緯直下相逢誰識𠍲始信斯人不合伴若肯直下承當方知本無一物洞山價禪師解夏上堂云初秋夏末兄弟或東或西直須向萬里無寸草處去不涉今時高超十界即藏身處無蹤迹良久大衆不得粗心利害全在此中云祗如萬里無寸草處又作麼生不住真空異中來往即無蹤迹處不藏身顧視左右應須著眼不可辜負云欲知此事直須枯木上生花方與他合枯則十界情絶生則十界情蘇注上之用敲唱並行石霜云出門便是草動落今時明安云直得不出門亦是草漫漫靜沉死水主意拈情旨明絶待總結作家唱和草漫漫門裏門外君自看太陽點靜石霜點動天童雙舉令人自看荊棘林中下腳易今時易下腳易轉身夜明簾外轉身難劫外難轉身難下腳看看幾何般三人三樣各著眼著且隨老木同寒瘠未到休心如木經寒將逐春風入燒瘢已到須蘇如花綻春仰山夢往彌勒所居第二座夙昔之緣尊者白云今日當第二座説法相究竟山起白椎云大用警衆摩訶衍法離四句絶百非謹白盡心直注主意拈情旨明直截總結不落階級夢中擁衲參耆舊列聖森森坐其右拈上公案當仁不讓楗椎鳴拈椎白衆説法無畏師子吼離句絶非如師全威心安如海無有傾動膽量如斗如薑維膽鮫目淚流淚出悲痛如鮫成珠蚌腸珠剖盡心吐出如蚌之剖譫語誰知泄我機夢泄玄微龐眉應笑揚家醜笑他逗離四句絶百非馬師父子病休醫天童恐落頑空令看勞倦頭痛陸亘大夫語南泉云肇法師道天地同根萬物一體也甚奇怪只見句奇不知自昧泉指花云大夫時人見此一株花如夢相似當央直截點他錯認主意拈轉話頭旨明直下明宗總結法窟爪牙照徹離微造化根離微之根南泉看破紛紛出沒見其門如坐於門出人皆見遊神劫外問何有劫外絶相何有天地萬物之問著眼身前知妙存身前無識唯一本分虎嘯蕭蕭岩吹作龍吟冉冉洞雲昏先悟劫外身前之妙然後却來今時路上如龍吟霧起似虎嘯風生豈可執一失諸南泉點破時人夢要識堂堂補處尊天童打草驚蛇不可開眼作夢直須領旨切莫辜負雲門垂語云乾坤之內宇宙之間明其依報中有一寶祕在形山寶隱在身拈燈籠來佛殿裏將三門來燈籠上恐乃情解今故直指主意明宗旨明拈情總結破權顯實收卷餘懷厭事華寶藏之繁華雲門之徑捷故曰收卷歸來何處是生涯天童恐無下落審問何處為歸爛柯樵子疑無路直饒絲毫不挂也是樵子迷家挂樹壺公妙有家倘肯直下承當方見雲門之妙如長房直入壺中方見壺公也夜水金波浮桂影金波桂影月之異名用表其明秋風雪陳擁蘆花雪陳蘆花二者皆白寒魚著底不吞餌興盡清歌却轉槎雲門拈處十分明白幾人能曉不遇知音如其釣者空棹舟回魯祖問南泉摩尼珠人不識如來藏裏親收得引教請益如何是藏泉云王老師與汝往來者是就問一提祖云不往來者未通再決泉云亦是藏指之無空祖云如何是珠疑而再決泉召云師祖急處一提祖應喏順情之回泉云去汝不會我語一拈二點主意急處一提旨明句裏呈機總結老婆心切別是非明得喪此言諸方生情妄認機境之誡應之心指諸掌人人有珠人人自昧王老就手方便一指往來不往來只這俱是藏雙拈問答左右逢原輪王賞之有功無上之珠不妄與人黃帝得之罔象在於無心不可強取轉樞機能伎倆此言先放後收智用甚活明眼衲僧莫鹵莾天童戒後不可粗心洞山不安僧問和尚病還有不病者麼性相各顯誰病不病山云有真妄不混故言之有僧云不病者還看和尚否須言不病還有看否山云老僧看他有分在病忘病故曰有分僧云和尚看他是如何細辨根源山云則不見病孤光獨照諸有不混主意探竿在手旨明靈光不混總結性相無礙卸却臭皮袋拈轉赤肉團當頭鼻孔正直下髑髏乾肉身如乎不挂法身自然周正老醫不見從來癖洞山能治天下人病今日病中皎然自在少子相看向近難這僧有言無實點他非見可及野水瘦時秋潦退水澄無泥心淨絶情白雲斷處舊山寒雲去山露相脫性彰須勦絶莫瞞盰我乃盡情分剖你便一刀兩段轉盡無功伊就位孤標不與汝同盤恐住其功今就其位若就本位方知尊貴臨濟問院主甚處來就事藏鋒主云州中糶黃米來只知具實而供不知動落今時濟云糶得盡麼見他不覺故又去拶主云糶得盡依然不懂濟以拄杖一畫云還糶得這箇麼米則故然這個如何主方喝只知大用現前不知靜沉死水濟便打截斷動靜次典座至濟舉前話指彼辨此座云院主不會和尚意只見他非不見己過濟云你又作麼生要見其的座便禮拜一模脫出濟亦打前後一截主意探竿在手旨明大用全提總結權衡在手臨濟全機格調高全提正令截斷動靜棒頭有眼辨秋毫眼前清明比於離婁掃除狐兔家風峻截斷二僧動靜之見變化魚龍電火燒變化諸方如魚成龍活人劒殺人刀倚天照雪利吹毛利劒當央能殺能活一等令行滋味別須同諸方不落階級十分痛處是誰遭問你諸人喫棒是誰石霜遷化衆請堂中首座接續住持大衆只見人材不見道業九峰不肯乃云待某問過若會先師意如先師侍奉只論道業不論人材問首座云先師道休去歇去一物不為一念萬年去永遠無更寒灰更無執相枯木去不生花葉古廟香爐去了無交涉一條白練去絶無垢染且道明什麼邊事皆是斷德法身之極將此為驗座云明一色邊事非為執其大功亦乃迷名滯相峰云恁麼則未會先師意在如此沉機辜負先師故曰未會座云你不肯我那裝香來自不知過所以不伏座乃燒香云我若不會先師意香煙起處脫去不得言訖便坐脫直饒坐脫立亡也是把定死蛇峰乃撫背云坐脫立亡則不無先師意未會在若認大功誠昧天真主意探竿在手旨明執法墮功總結沉空滯寂石霜一宗親傳九峰九峰親悟先師之妙香煙脫去正脈難通有體無用過在執法月巢鶴作千年夢雪屋人迷一色功自誇明白執功不捨坐斷十方猶點額及盡今時抱妙不捨如魚遭點死與句下密移一步看飛龍倘然撒手如龍飛空同光帝謂興化云寡人收得中原一寶只是無人酬價因取大梁得勝故乃借事呈奇化云借陛下寶看以計驗計帝以兩手捧幞頭大用親呈化云君王之寶誰敢酬價一奉天府二截方隅佛事人情一時周足主意探竿在手經明大用全提總結作家相見君王底意語知音二人相契天下傾誠葵藿心興化奉主如葵捧日掇出中原無價寶不同趙璧與燕金賞其絶類中原之寶呈興化一段光明難定價不落凡聖誠難言説帝業堪為萬世師金輪景耀四天下君主當時師垂萬古四輪之中金輪第一僧問洞山三身中那身不墮諸數法身高超十界非比山云吾常於此切盡情指示主意就見呈見旨明句裏呈機總結一念無私不入世未循緣不落凡聖劫壺空處有家傳執功住位白蘋風細秋江暮古岸船歸一帶煙不守圓極之功自然歸家穩坐僧問雲門如何是塵塵三昧請益門云鉢裏飯桶裏水函蓋相應主意直下明宗旨明無有意路總結信手拈來鉢裏飯桶裏水開口見膽求知己其僧開口雲門見膽兩手分付誰是知音擬思便落二三機對面忽成千萬里疑議思量千山萬水韶陽師較些子當央直指更無回互斷金之義兮誰與相共雲門把手相行其利分金何比匪石之心兮獨能如此石之可移席之可卷雲門之見不可輕動僧問琅琊覺和尚清淨本然云何忽生山河大地富樓那問佛之詞僧將驗主覺云清淨本然云何忽生山河大地以見拈見以句點句主意就事破事旨明當央直截總結劈筈奪窩見有僧之情也不有覺之拈也翻手覆手不動來機以機拈機如不去手只就一反琅琊山裏人不落瞿曇後琅琊天童皆出佛祖之外今日利生隨緣以楔出楔
