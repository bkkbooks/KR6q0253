body:
  text: 金臺慈仁沙門性福編集菩曇後學沙門淨深重梓世尊一日升座當央直示文殊白槌云大用驚衆諦觀法王法法王法如是盡情注解世尊下座見殊漏泄不免拂迹主意直示旨明大用總結師資唱和一段真風見也麼人人具足一段真風世尊親呈天童問你諸人還見真風麼綿綿化母理機梭織成古錦含春象世尊放出春風和氣文殊便乃葉綻花開二人又如經緯交羅織成一錦此言一人作頭一人作尾方得完全而已無奈東君漏泄何文殊白槌世尊下座只知拂迹不知漏泄故曰無奈梁武帝問達磨大師如何是聖諦第一義撥却真俗直問中道呈解驗主磨云廓然無聖了無一法何安聖諦一拈二截帝云對朕者誰不領其旨逐句返追磨云不識當頭一截不容對待帝不契權實不投渡江至魏主意拈情旨明向上總結不遇知音廓然無聖來機徑庭言不相讓徑直而拈得非犯鼻而揮斤聖諦如鼻端之存泥廓然似揮斤之削泥失不回頭而墮甑意不相契如甑之破武帝復趕磨不回頭寥寥冷坐少林默默全提正令非是冷坐無言乃是全提正令秋清月轉霜輪河淡斗垂夜柄秋清不犯今時月轉不犯劫外當央直示不存毫髮故曰斗垂夜柄繩繩衣鉢付兒孫從此人天成藥病祖乃覿面相呈尚不領旨于今只去口傳心受衣鉢相傳豈不慙惶天童非言武帝痛戒後來東印土國王請二十七祖般若多羅齋王問云何不看經尊者當央直示王疑默坐不念祖云貧道入息不居陰界暗不坐正出息不涉衆緣明不坐偏此注上機當央直示常轉如是經百千萬意卷出入無拘正偏自在不落有無故曰常轉主意當央直示旨明句裏呈機總結明暗不落雲犀玩月燦含暉不居陰界暗中獨露木馬遊春駿不羇不涉衆緣明中絶相眉底一雙寒碧眼尊者雙眼圓明故曰含暉不看經那到透牛皮貶他大衆空鑽故紙如皮裹眼何時得透明白心超曠劫五蘊空也心之虗明空而獨顯英雄力破重圍力之威嚴境中縱橫妙圓樞口轉靈機機轉靈樞左右無拘寒山忘却來時路十年忘却來時路此言衆僧昧己逐緣也拾得相將携手歸閭丘胤逢拾得把手入門尊者於王於衆未歸令歸未出令出忒殺婆心世尊於衆行手指地云此處宜建梵剎當央直示恐失再試帝釋將一莖草插於地上云建梵剎已竟對面親呈亦塞來意世尊微笑大用深賞主意探竿在手旨明大用親呈總結作家相見百草頭上無邊春信手拈來用得親帝釋信手拈來如春遍地無揀丈六金身功德聚等間携手入紅塵世尊婆心全身落草塵中能作主四心無量為十界主化外自來賓道彌寰宇阿誰不來歸向觸處生涯隨分足世尊帝釋皆隨其分未嫌伎倆不如人未嫌我之德行未有不如於天下僧問清源如何是佛法大意請益源云廬陵米作麼生價隔身反點主意拈轉話頭旨明當機一截總結法窟爪牙太平治業無象四夷不侵萬民樂業漠無功位何象之示野老家風至淳只管村歌社飲那知舜德堯仁堯舜之道至治無為野老郊外之民只知村歌社飲不知無為之化此言清源飢餐渴飲不知佛法世法僧問馬祖離四句絶百非有句無句非有非無句非非有非非無句四句一離百非自絶請師直指西來意心幸驗主祖云我今日勞倦不能為汝説全機直指不妨蓋覆問取智藏去推惡去己僧問藏藏云何不問和尚照用同時僧云和尚教來問具供藏云我今日頭痛不能為汝説問取海兄去非父不生其子僧問海海云我到這裏不會只知盡法不管無民僧舉馬祖祖云藏頭白海頭黑當央直指主意直指旨明絶待總結權衡在手藥之作病鑑乎前聖離四天下之藥此僧為病反驗病之作醫必也其誰勞倦頭痛天下為病父子為醫藥之於病且道是誰白頭黑頭兮克家之子白頭智藏黑頭智海二子克家善能荷負有句無句兮截流之機有句大師父子無句維摩一默用在當時俱皆截流堂堂坐斷舌頭路堂者明也父子有言應笑毗耶老古錐笑他把住不如放行藥山久不升座院主白云大衆久思示誨請和尚為衆説法仁義之心山令打鐘就事行令衆方集見二失一山升座當央直示良久便下座只知拂迹不知獨露歸方丈主隨後問云和尚適來許為衆説法云何不垂一言不知自失反怪不説山云經有經師論有論師爭怪得老僧一點二拈主意當央直示旨明大用全提總結向上癡兒刻意止啼錢出口入耳盡是止啼黃葉癡子反為黃金良駟追風顧影鞭外道問佛不問有無世尊良久外道大悟比言東土衲子不如西天外道雲掃長空巢月鶴寒清入骨不成眠雲掃長空纖塵不立月明鶴白十分明白反怪不言而豈成眠百丈上堂常有一老人聽法大衆散去一日不去丈問立者何人老云某甲於過去迦葉佛時曾住此山有學人問大修行底人還落因果也無對他道不落因果墮野狐身五百生見師越格逾常之手所以捨己從人出前希後之請今請和尚代一轉語丈云不昧因果前之撥無後之拈轉使他直下免滯空無老人言下大悟果爾英俊不負其旨主意拈轉話頭旨明機見而作總結隨緣得旨一尺水一丈波虗詐不實五百生前不奈何因妄感報不落不昧商量也依前撞入葛藤窩曾有二僧講曰不落何墮不昧何脫如此葛藤總未勦絶意須超羣未出言思故曰依前撞入阿呵呵會也麼天童出自胸襟當央直示問你諸人這笑是不落是不昧若向這裏會得免去二邊奔競若是你灑灑落落若是你不逐二邊自然酒落不妨我哆哆和和此是嬰兒學語之貌不落不昧總皆自在先之雙奪二俱不存後之雙縱二俱任意神歌社舞自成曲拍手其間唱哩囉若然如此這邊那邊無可不可自然隨緣無擇南泉一日兩堂爭貓泉提起貓云道得即不斬全機垂釣衆無對不妨截斷泉斬貓為兩段凡聖不存南泉舉問趙州疏通前旨州脫鞋戴出親呈大用泉云子在救得貓兒出身賞德主意垂釣旨明大用總結父子唱和兩堂雲水盡分拏胡爭亂講王老師能驗正邪王老提貓辨其凡聖利刀斬斷俱忘像千古令人愛作家全提正令今古咸尊此道未喪知音可嘉既遇知音便顯作家鑿山透海兮唯遵大禹前之衆僧閉塞此道今之王老重復開通如其大禹獨顯神用鍊石補天兮獨賢女媧見其先失今之大補如乎女媧方得圓滿趙州老有生涯草鞋頭戴較些些這些妙處須是不多獨顯趙州具有手眼異中來也還明鑑只個真金不混沙金之異沙州之異衆臺山路上有一婆子凡有僧問臺山路向什麼處去問本尋常婆云驀直去當央直指僧才行知偏失正婆云好個阿師又恁麼去點失當央僧舉似趙州有疑故舉州云待與勘過須聞其事未見其的州云臺山路向什麼處去探竿在手婆云驀直去對面親指州便行就計陷計婆云好個阿師又恁麼去只言點他不知自失州上堂我與汝勘破婆子了也一呈一釣主意方便為人旨明以見陷見總結心幸年老成精不謬傳婆子善能為人賞他成精不謬趙州古佛嗣南泉南泉的子天下明師刳龜喪命因圖象點婆子被趙州換却眼睛如龜之刳腸良駟追風纍纏牽點趙州被婆子之抽牽如穆王追風之馬不免受韁勘破了點州休誇老婆禪點婆休逞説向人前不直錢二人不必誇俊總被天童看破雲門大師云光不透脫有兩般病標題一切處不明面前有物是一靈光混物光物不辨故曰不明透得一切法空隱隱地似有個物相似亦是光不透脫靈光出有又混於無似有覺知不能了無故曰隱隱又法身亦有兩般病標題得到法身為法執不忘己見猶存墮在法身邊是一出過前之有無忽悟法身執之不捨所以己見唯存直饒透得放過即不可法身撒手不住大功脫落無依又住無功子細點檢將來有甚氣息亦是病若住無功無功亦病更須檢點忽然看破一場笑具主意拈情破執旨明不落階級總結老婆心切森羅萬象許崢嶸透脫無方礙眼睛直下明宗乾坤總是欲要了脫反被境礙掃彼門庭誰有力隱人𮌎次自成情誰能掃除萬物方得真空只是隱人自生空見船橫野渡涵秋碧纜船死水永無那移得到法身執法不捨棹入蘆花照雪明撥轉船頭又入蘆花不住法身又坐明白串錦老漁懷舊市飄飄一葉浪頭行錦破一色漁破死水市破孤峰此明轉位就功入𮠔垂手地藏問修山主甚處來就事藏峰修云南方來直供藏云南方近日佛法如何藏鋒修云商量浩浩地直供藏云爭如我這裏種田賻飯喫若然如此不如種田修云爭奈三界何只討飯喫三界何出藏云你喚什麼作三界見他外奔就鼻一拽主意探竿在手旨明句裏呈機總結權衡在手宗説般般盡強為流傳耳口便支離出口入耳之流説甚宗通説通種田賻飯家常事不是飽參人不知若是滿懷風月方見平實一道參飽明知無所求子房終不貴封候封侯者外紹也子房不貴大功不宰所以知不在他忘機歸去同魚鳥忘機絶慮不住偏方同魚同鳥不坐正位便見平懷常實之道濯足滄浪煙水秋然後却乃觀其時變隨緣赴感如乎漁父詞曰清則濯纓濁則濯足地藏之才猶如斯之用也臨濟將示滅囑三聖云吾遷化後不得滅却吾正法眼藏一則日用中不得忘失二要接續也聖云爭敢滅却和尚正法眼藏既為佛子豈不奉重濟云忽有人問汝作麼生對恐有未的故又驗過聖便喝當央直呈濟云誰知吾正法眼藏向這瞎驢邊滅却見其勦絶所以大賞主意探竿在手旨明全提大用總結老婆心切信衣半夜付盧能攪攪黃梅七百僧黃梅七百未有明旨暗傳六祖大小分爭臨濟一枝正法眼瞎驢滅却得人憎三聖之俊恨不有如心心相印祖祖傳燈以心印心今古不絶夷平海嶽變化鯤鯨絶高低轉聖凡三聖一喝無不夷平變化只個名言難比擬大都手段解翻騰正眼一絶如何有比願其十方聖流悉如三聖之用廓侍者問德山從上諸聖向什麼處去驗主山云作麼作麼全身擔荷照用同時廓云勑點飛龍馬跛鱉出頭來只言奉勑點過之馬元來却是一個跛鱉山便休去跛鱉飛龍兩手回還不妨德山一毫不受來日山浴出廓過茶當央直示山撫廓背一下正令一截廓云這老漢今日方始瞥地今方穩當山又休去看他還得穩當也無此名德山兩處陷虎主意探竿影草旨明機鋒互換總結心幸覿面來時作者知當央直問非英不達可中石火電光遲答處迅速非見可及輸機謀主有深意兩次之休大有作略欺敵兵家無遠思只知量作不妨遭陷發必中撫背如發箭瞥地如受箭更瞞誰衆見難瞞腦後見腮兮人難觸犯侍者之機人難當堵眉低著眼兮𠍲得便宜仔細觀看無出其師溈山問仰山甚處來就事藏鋒仰云田中來就事呈機山云田中多少人恐落今時仰插下鍬義手而立大用親呈山云南山大有人刈茆恐落孤危當頭一點仰拈鍬便行截斷兩頭逈然不立主意養子之緣旨明不落二邊總結老婆心切老覺情多念子孫恐落動靜故令得力而今慚愧起家門已知羞恥不落羣方是須記取南山語鏤骨銘肌共報恩此策後人將南山語記在心上如鏤於骨使無忘也麻谷持錫到章敬繞床三匝振錫一下卓然而立呈機校勘敬云是是照用同時師著語云錯恐陷其是故乃拈之谷又到南泉繞床三匝振錫一下卓然而立泉云不是不是照用同時師著語云錯恐陷不是故乃拈之谷云章敬道是和尚為甚道不是逐句雙疑泉云章敬是是汝不是此是風力所轉終成敗壞過在於汝非干師事情逐於境豈不喪真主意辨驗旨明拈情總結權衡在手是與不是好看裷䙡二師之言總是套索似抑似揚難兄難弟章敬放而有收南泉奪而有縱似有差殊本無彼此縱也彼既臨時奪也我何特地皆在臨時明無安排金錫一振太孤標覿面相呈更無回互繩床三匝間遊戲東西往返蓋是尋常叢林擾擾是非生想像髑髏前見鬼天下之人只在是非之上奔競豈不眼前見鬼法眼問修山主毫釐有差天地懸隔汝作麼生會向上之機以為探修云毫釐有差天地懸隔須乃順言呈自情見言須一般意有正偏眼云恁麼又爭得點他情見若恁何奇修云某只如此和尚如何屈己從人眼云毫釐有差天地懸隔以見出見當央直截修便禮拜方見自過已謝錯認主意探竿旨明拈情總結權衡在手稱頭蠅坐便欹傾一毫之差如蠅在稱萬世權衡照不平進之必過退之不及直要具中方為恰好今古權衡只為不平斤兩錙銖見端的斤兩為建化絲髮分明未出今時終歸輸我定盤星定盤為實際故曰輸我僧問趙州狗子還有佛性也無借事請益州云有當央直指僧云既有為甚撞入這皮袋逐句反問州云為他知而故犯就見一點又僧問狗子還有佛性也無逐事生疑州云無當央直指僧云一切衆生皆有佛性狗子因甚却無逐語迷情州云為伊有業識在就見一點主意直下明宗旨明言思無路總結權衡在手狗子佛性有狗子佛性無拈上公案直鈎元釣負命魚直無委曲情絶方領逐氣尋香雲水客嘈嘈雜雜作分疏迷真逐妄如狗咽骨平展演大鋪舒莫怪儂家不慎初廣大平實當央捧出故曰不慎指點瑕疵還奪璧秦王不識藺相如兩次捧出兩次點罰又如相如獻璧於秦末後還奪僧問雲門不起一念還有過也無呈功決擇門云須彌山當央直指主意拈轉話頭旨明無有意路總結轉位就功不起一念須彌山拈案韶陽法施意非慳肯來兩手相分付直下領旨便是分付擬去千尋不可攀才生異見不勞相見滄海濶白雲間海濶雲間一昧平實莫將毫髮著其間雲門先破孤危天童今破平實假雞聲韻難瞞我未肯糢糊放過關孤危平實皆非本分今已説破再犯不容地藏問法眼上座何往就事行事眼云迤邐行腳大事不明豈肯死住藏云行腳事作麼生就見一拶眼云不知直供藏云不知最親切這個不知更無別有眼乃豁然大悟方悟向上主意就見用見旨明急處一提總結老婆心切而今參飽似當時于今大悟之時似舊卜度如何脫盡廉纖到不知絶毫絶𨤲方悟不知任短任長休剪綴隨高隨下自平持一切諸法本來現成不須穿鑿自然恰好家門豐儉臨時用應用皆在臨時何必預先安排田地優遊信步移家風穩密無不自然三十年前行腳事分明辜負一雙眉方知從前一切錯用雲巖掃地道吾云太區區生點動失動巖云須知有不區區者在動無動吾云恁麼則有第二月點靜失靜巖提起掃云這個是第幾月在靜無靜吾便休去見他據令所以回互玄沙云正是第二月怪不行令雲門云奴見婢殷勤亦怪放過主意探竿在手旨明不落二邊總結作家相見借來聊爾了門頭得用隨宜即便休雲巖提處坐斷兩頭道吾知奇所乃不犯象骨巖前弄蛇手兒時做處老知羞三人在象骨巖豈不是奴兒婢子之見今不知羞又來誇設巖頭到德山跨門便問是凡是聖藏鋒辨主山便喝正令一截頭禮拜一謝二點洞山聞云若不是奯公大難承當不是奯公必行其令頭云洞山老漢不識好惡我當時一手擡一手搦只知我放不知我收不妨供出主意探竿在手旨明正令全提總結心幸挫來機總權柄三人折挫皆有權柄事有必行之威山喝國有不犯之令頭拜賓尚奉而主驕洞山奉之巖頭驕恣君忌諫而臣君忌德山不容臣佞岩頭多語底意巖頭問德山一擡一搦看心幸總結三人一並令看魯祖凡見僧來便面壁當央直示南泉聞云我尋常向他道空劫已前承當佛未出世時會取隔身傍通尚不得一個半個他恁麼驢年去責他孤峻主意直示旨明向上總結作家唱和淡中有味淡是本味用明本體妙超情謂出過言思綿綿若存兮象先空劫絶形故曰綿綿兀兀如愚兮道貴今時絶情故曰兀兀玉琢文以喪淳南泉無名立名如玉無文琢文珠在淵而自媚魯祖無言十分深密珠之在淵無人能見十分爽氣兮清磨暑秋具足幽清古今不改一片間雲兮遠分天水本忘上下却被雲分雪峰示衆云南山有條鱉鼻蛇汝等諸人切須好看禪者之病多困孤危今之雪老故示平實長慶云今日堂中大有人喪身失命點其衆僧莫道究用連本已失僧舉似玄沙沙云須是稜兄始得然須如是我即不與麼搦人顯己僧云和尚作麼生就見追見沙云用南山作麼以見一拈雲門以拄杖攛向雪峰面前作怕勢理事雙彰照用同時主意拈轉話頭旨明全提大用總結父子唱和玄沙太剛拈却南山長慶少勇隨風倒柁南山鱉鼻死無用本是死物有何用處風雲際會頭角生諸師聚會手眼各顯果見韶陽下手弄下手弄激電光中看變動大用隨宜韶陽果別在我也能呼能遣在彼也有擒有縱呼遣擒縱彼我無拘底事如今付阿誰冷口傷人不知痛天童先使月鈎雲餌今乃當頭點罰鹽官一日喚侍者與我過犀牛扇子來言中有響者云扇子破也具供官云扇子既破還我犀牛兒來法空追人者無對忙然失所資福畫一圓相於中書一牛字大用全彰主意就事明宗旨明句裏呈機總結作家唱和扇子破索犀牛句活無滯棬攣中字有來由大用當央豈同小小誰知桂轂千年魄天童甚巧引其全虧之月不露圭角用明不住偏方妙作通明一點秋引其全圓之月飽體獨明可門不坐正位資福天童屈盡其妙仰山指雪獅子云還有過此色者麼一色者純一無雜雪色至白還有過否雲門云當時便與推倒恐住一色雪竇云只解推倒不解扶起恐住無色主意鈎垂四海旨明不住二邊總結作家唱和一倒雲門一起雪竇雪庭獅子仰山慎於犯而懷仁勇於為而見義指雪忌白故令不犯三人懷仁勇為見義清光照眼似迷家一色映眼迷其本位明白轉身還墮位不住一色又住正中衲僧家了無寄同死同生何彼何此不居尊位平和一律暖信破梅兮春到寒枝涼飈脫葉兮秋澄潦水天童慈悲恐成三段使其圓融互顯故言暖信破梅處涼飈脫葉秋澄潦水處春到寒枝法眼一手指簾當央直示二僧同去捲簾昧己逐緣眼云一得一失當央一點主意直下明宗旨明大用全提總結空示無承松直棘曲鶴長鳧短松棘鶴鳧因有天地心境凡聖因有佛祖羲皇世人俱忘治亂未有天地本無曲直長短未有佛祖本無迷悟得失其安也潛龍在淵其逸也翔鳥脫絆法眼天童道純德熟處之如龍在淵出之似鳥飛空無何祖禰西來裏許得失相半得失者今時之取捨無何者劫外之絶相欲了今時之妄須明劫外之真蓬隨風而轉空若看其簾如蓬逐風船截流而到岸倘達其指如船到岸個中伶俐衲僧看取清涼手段告報諸方俱著眼看僧問護國鶴立枯松時如何借事呈解國云地下底一場懡㦬點執拈情僧云滴水滴凍時如何借事驗主國云日出時一場懡㦬點執拈情僧云會昌沙汰護法善神向甚麼處去武宗滅僧名為沙汰國云三門頭兩個一場懡㦬見外求護所以點罰主意破執旨明拈情總結法窟爪牙壯士稜稜鬢未秋男兒不憤不封侯未得見性須如班超取功封侯翻思清白傳家客洗耳溪邊不飲牛既已見性須如楊震巢父許由清白不飲風穴郢州衙內上堂云祖師心印狀似鐵牛之機搖撼不動亦無縫罅去即印住不令逐境住即印破不令立玄只如不去不住印即是不印即是不住二邊正當恁麼又作麼生盧陂長老出問某有鐵牛之機請師不搭印識句拈情穴云慣釣鯨鯢沉巨浸却嗟蛙步𩥇泥沙慣釣巨鯢豈怕青蛙陂佇思失情穴喝云長老何不進語你道不搭因何無路陂疑議進退無門穴打一拂子云還記得話頭麼提前逼後陂擬開口左右絶路穴又打當央直截牧主云佛法與王法一般傍觀者哂穴云見個甚麼審他見處主云當斷不斷反招其亂合行不行合止不止穴下座非只盧陂亦有風穴故就拂迹主意大用全提旨意攙旗奪鼓總結權衡在手鐵牛之機印住印破拈前公案透出毗盧頂上行透出頂上住即印破却來化佛舌頭坐坐斷舌頭去即印住風穴當衡權衡在手盧陂負墮不免受降棒頭喝下電光石火正令全提聖凡不容歷歷分明珠在盤活脫如珠捉拿不住眨起眉毛還蹉過直饒眼似流星依舊當面蹉過僧問大隋劫火洞然大千俱壞未審這個壞不壞隋云壞僧云恁麼則隨他去隋云隨他去僧問龍濟劫火洞然大千俱壞未審這個壞不壞濟云不壞呈機一截僧云為什麼不壞逐句生疑濟云為同大千於世無二拈前發後主意不住二邊旨明句裏呈機總結作家拈提壞不壞隨他去也大千界雙標問答一例同行句裏了無鈎鎖機言言直指何有崎嶇腳頭多被葛藤礙若逐言句盡成鈎鎖會不會雙審前機分明底事丁寧殺現成之事何須苦苦知心拈出勿商量輸我當行相買賣若是知心如買賣當行何用商量雲門垂語云古佛與露柱相交是第幾機佛喻性柱喻形性形相交且道是誰自代云南山起雲北山下雨當央直指主意垂釣旨明絶待總結不存玄解一道神光初不覆藏此段靈光在空不混其空在有不混其有何藏之也超見緣也是而無是外超其見何有是非出情量也當而無當內出其情何有取捨岩花之粉兮蜂房成蜜野草之滋兮麝臍作香偏中得正何境不心花自成蜜草自成香隨類三尺一丈六明明觸處露堂堂正中得偏何心不境三尺丈六隨類何分仰山問僧甚處人就事探僧云幽州人就事呈見山云汝還思彼中麼以見驗見了無空缺僧云常思豈可有忘山云能思是心所思是境彼中山河大地樓臺殿閣人畜等物反思思底心還有許多般麼情乃還心物乃還境心非是境汝觀此心還有境否某甲到這裏總不見有外境不見內心又存山云信位即是人位未是信即法泯存人人即本來尊貴僧云莫別有指示否除此之外可更有否山云別有別無即不中據汝見處只得一玄道非有無故曰不中只得一玄有體無用得坐披衣向後自有去功至位故曰得坐去位入故曰披衣不住二邊方知我説主意拈情旨明絶待總結落階級無外而容一切即一何境不心無礙而沖一即一切何心不境門墻岸岸關鎖重重心境兩分內外成隔酒常酣而臥客飯雖飽而頽農貪食必傷戀法必陷突出虗空兮風摶妙翅踏翻滄海兮雷送遊龍脫出功位龍離大海鳥出高巢豈不縱橫三聖問雪峰透網金鱗未審以何為食借事呈解出過凡聖以何為道峰云待汝出網來即向汝道就見一陷反追來趣聖云一千五百人善知識話頭也不識法窟爪牙當央一點峰云老僧住持事繁不辨賢愚退已一陷主意回換旨明心幸總結作家相見浪級初升雲雷相送三聖浪裏翻身雪峰雲中激電騰躍稜稜看大用令人著眼燒尾分明度禹門華鱗未肯淹虀甕既透禹門必弘大用不受籠罩故曰未肯老成人不驚衆慣臨大敵初無恐慣便作家只當尋常泛泛端如五兩輕堆堆何啻千鈞重輕如五兩恰似尋常重若千鈞十分利害高名四海復誰同三聖之後四海絶類介立八風吹不動雪峰之奇八風安動風穴垂語云若立一塵家國興盛纖塵不立一性圓明不立一塵家國喪亡機盡情忘杳無依倚師拈拄杖云還有同生同死底衲僧麼未有得者我與你立主意垂釣旨明無住總結大功不宰皤然渭水起垂綸建立大功如何子牙扶持周國何似首陽清餓人休息本位如乎夷齊餓死首陽只在一塵分變態高名勛業兩難泯興如子牙立周喪如夷齊去國變態雙存故曰難泯洛浦參夾山山云雞棲鳳巢非同其類雞占山坡鳳飛高漢形似行別故曰非類濟下只得轉功就位不能轉位就功故有如此之拈浦云自遠趨風乞師一接見示爪牙不免軟計山云目前無闍黎此間無老僧接則主賓對待名為今時不接主賓絶待獨明向上一截二拈三乃紅綿套索浦便喝洞下則要回互濟下只明當央所以不同山云住住且莫草草匆匆戒其倉卒不斟來言須知雲月是同溪山各異雲月溪山皆同一空因何雲暗月明溪流山止臨濟曹洞本是一宗濟下全提正令洞下機貴回互古云涅槃心易曉差別智難明是也截斷天下人舌頭即不無爭教無舌人解語此言只解把住不解放行之過浦無對知過方伏山便打全提正令主意拈轉話頭旨明轉位就功總結權衡在手搖頭擺尾赤稍鱗徹底無依解轉身一喝之活如魚在水截斷舌頭饒有術拽回鼻孔妙通神直饒轉功就位更要轉位就功夜明簾外兮風月如晝枯木巖前兮花卉長春夜明枯木皆是正位風月花卉總是偏方兩段雙示故令撒手無舌人無舌人前拈孤危後拈平實直下坐斷方見向上正令全提一句親若會上句方是正令全提獨步寰中明了了任從天下樂忺欣果到此地非但寰中獨具任行天下縱橫馬祖不安院主問和尚近日尊候如何仁義之問祖云日面佛月面佛養子之心主意直下明宗旨明無有意路總結問以人情答以直指日面月面星流電卷直下無私不容擬議鏡對象而無私公正無拘珠在盤而自轉活脫無礙君不見鉗鎚前百鍊之金金之百鍊在乎作家刀尺下一機之絹絹之一機在乎二巧溈山問仰山忽有一人問一切衆生但有業識茫茫無本可據子作麼生驗養子之心仰云若有僧來即召云某甲便示己見僧回首乃云是什麼待伊疑議向他道非唯識業茫茫亦乃無本可據擒縱殺活呈師可證山云善哉善哉符心印可主意探竿在手旨明法窟爪牙總結老婆心切一喚回頭識我否依稀蘿月又成鈎一喚回頭你還識否稍有疑議如乎認月為鈎豈不顛倒也千金之子才流落漠漠窮途有許愁真如之理本來現成才失無門千金之子本來尊貴才然流落如阮藉窮途而哭回臨濟示衆云有一無位真人常在面門出入初心未證據者看看真人只在面門未明急須著眼僧問如何是無位真人聞示故追濟下禪床擒住大用親提僧疑議空示不領濟托開云無位真人是甚乾屎橛恐生情見故爾拂迹主意垂釣為人旨明大用全提總結權衡在手迷悟相返妙傳而簡逐事曰迷契理曰悟迷悟直下妙傳而簡春拆百花兮一吹力回九牛兮一挽百花一吹便開九牛一挽倒回空示大用嘆不領旨無奈泥沙撥不開分明塞斷甘泉眼泉眼不開泥沙之塞道眼不開情見所閉忽然突出四橫流復云險天童出脫此僧忽然大悟誰敢當鋒曰險僧問趙州學人乍入叢林乞師指示自稱大悟徹細未決借事呈解州云喫了粥也未悟了也未僧云喫粥了已悟了也州云洗鉢去令他除悟主意借事明宗旨明句裏呈機總結入就藏鋒粥罷令教洗鉢盂豁然心地自相符聞此清訓忽了前悟而今參飽叢林客且道其間有悟無天童審你諸方果是有悟無悟雲門問乾峰請師答話探竿在手峰云到老僧也未影草隨身門云恁麼則某甲在遲輸己陷人峰云恁麼那恁麼那一點二拈門云將謂侯白更有侯黑自稱為絶不妨更勝主意探竿影草旨明鋒機回互總結作家相見弦筈相㗸雲門之見鋒不可觸網珠相對乾峰之用一多無礙發百中而箭箭不虗如箭不空攝衆景而光光無礙似珠交映得言句之總持舉一知諸住遊戲之三昧隨緣自在妙其間也宛轉偏圓理事互用必如是也縱橫自在出入無拘洛浦臨終示衆云今有一事問你諸人這個若是即頭上安頭誰敢立是若道不是斬頭覓活誰敢立非首座云青山常舉足有山則行不立非也白日不挑燈日不加燈不立是也浦云是什麼時節作這個説話點他逐句彥從云去此二途請師不問拈師之見浦云未在更道撥前追後從云某甲道不盡向上非言浦云我不管你道盡道不盡不許技捂從云某甲無侍者祗對和尚至微絶待安有祗陪浦休去回互當頭至晚喚從上座今日祗對甚有來由合體得先師道目前無法意在目前目前無法心境雙收意在目前心境雙放他不是目前法非耳目所到本無心境見之不到且道那句是賓那句是主本無賓主以賓主驗若揀得出分付鉢袋子合旨付宗從云不會直供浦喝正令當行云苦哉苦哉嘆不遇人僧云和尚尊意如何見不相投故乃請益浦云慈舟不棹清波上劍峽徒勞放木鵝嘆滯死水故曰不棹不遇知音故曰徒勞主意探竿旨明垂釣總結婆心空切餌雲鈎月釣清津年老心孤未得鱗空垂其釣不獲錦鱗一曲離騷歸去後汨羅江上獨醒人抱妙不活故不分付如屈原分至死而不草草僧問忠國師如何是本身盧舍那請益師云與我過淨瓶來句裏呈機僧將淨瓶到兀兀不知師云却安舊處忒殺婆心僧復問如何是本身盧舍那師云古佛過去久矣點他蹉過主意急處一提旨明句裏呈機總結空示無知鳥之行空魚之在水江湖相忘雲大得志鳥得志於空而不知空魚得志於水而不知水人之日承佛力而不知佛擬心一絲對面千里一絲之差千里之隔知恩報恩人間幾幾背親向疏不知承順羅山問巖頭起滅不停時如何呈妄求除頭咄大用全提云是誰起滅一點一提主意當央一指旨明大用全提總結老婆心切斫斷老葛藤打破狐窩窟一喝如刀如鎚僧疑如藤如窟豹披霧而變文龍乘雷而喚骨一喝如霧如雷其僧如豹如龍承此大機變文換骨之比咄截前示後起滅紛紛是何物垂釣審奇僧問興陽剖和尚娑竭出海乾坤震覿面相呈事如何借事明妙陽云妙翅鳥王當宇宙個中誰是出頭人其鳥食龍所以據令僧云忽遇出頭時又作麼生不解回互抗拒反追陽云似鶻提鳩傍注上令君不覺御樓前驗始知真如乎不信似趙勝懸美人頭於樓前始信僧云恁麼則叉手當胸退身三步須解回互亦不作家陽云須彌座下烏龜子莫待重教點額回一點二拈主意據令旨明爪牙總結權衡在手絲綸降號令分寰中天子塞外將軍天子絲綸將軍號令兩段俱分君臣定位不待雷驚出蟄點他強勉那知風遏行雲妙翅當頭不能回互機底連綿兮自有金針玉線若論今時君臣之道分開結合又如經緯交羅織成一錦之文印前恢廓兮元無鳥篆蟲文若論劫外本無賓主如玉未印何有文章圓覺經云居一切時不起妄念於妄無妄故曰不起於諸妄心亦不息滅於心無心故曰不息住妄想境不加了知於境無境故曰不了於無了知不辨真實於真無真故曰不辨主意當體無分旨明剎塵不二總結一理渾然巍巍堂堂磊磊落落大人之相法法無閙處刺頭境之於妄混入無分穩處下腳心之於真圓融無別腳下線斷我自由四法無分乾坤一律鼻端泥盡君休斫四法情盡佛生莫論莫動著恐有未悟不許動著倘肯直下四法無餘千年故紙中合藥若然會得經旨須舊法令唯新故曰中合德山上堂云及盡去也直得三世諸佛口挂壁上聖凡一絶言思無路猶有一人呵呵大笑若識此人參學事畢且道笑他做個什麼把定死蛇頭何年得活脫若解翻身大千無不自在主意拈情破執旨明大功不宰總結不落二邊收把斷襟喉凡聖情盡性相見滅風磨雲拭水冷天秋前存大功恐滯此地壞劫之風吹盡世間恐滯無功更將風磨雲拭方到水冷天秋錦鱗莫謂無滋味釣盡滄浪月一鈎到此之時方無佛法世法忽然看破不妨一場懡㦬僧問趙州如何是祖師西來意州云庭前柏樹子當央直指主意直指旨明絶待總結直下明宗岸眉橫雪眉白老也河目含秋眼碧明也海口鼓浪能成能壞航舌駕流任往任來撥亂之手令人生情太平之籌便人知歸老趙州老趙州攪攪叢林卒未休能迷能悟至今不了徒費工夫也造車合轍諸方穿鑿故曰徒勞本無伎倆也塞壑填溝如此行持到他分上只中填溝維摩詰問文殊師利何等是菩薩入不二法門探竿殊云如我意者於一切法無言無説言語不通無示無識示識不及離諸問答問答皆離是為入不二法門以無遣有一切掃蕩於是文殊問維摩我等各自説已三十二法各説法已仁者當説何等是菩薩入不二法門返請其佳維摩默然當央直示主向探意旨明向上總結相演揚曼殊問疾老毗耶廣嚴城也不二門開看作家三十二士必有英俏珉表粹中誰賞鑑維摩默然如石含玉忘前失後莫咨嗟前後斷續中處自孤區區投璞兮楚庭臏士文殊只言無示無識不知滿口歌揚又如卞和獻玉不知刖足燦燦報珠兮隋城斷蛇只知盡情吐出不知反恩為讐如蛇吐珠反遭劍斬休點破絶疵瑕維摩直示文殊漏泄如玉無瑕反成其瑕俗氣渾無却較些須居塵全為俗洞山供養雲巖真舉前邈真話僧問雲巖只這是意旨如何借事請益山云我當時幾錯會先師意直供僧云未審雲巖還知有也無知有是偏名為奉重借事決疑山云若不知有爭解恁麼道因其知有故乃提持若知有爭肯恁麼道因其不知故無回互主意宛轉回互旨明兼帶叶通總結敲唱並行爭解恁麼道五更雞唱家林曉雞唱漏泄玄風乃明正中之偏爭肯恁麼道千年鶴宿雲松老鶴宿得其位也乃明偏中之正寶鑑澄明驗正偏鏡有背面須分偏正玉機轉側看兼到經緯交羅正偏通貫門風大振兮規步綿綿父子變通兮聲光浩浩父子規矩大行天下十方道者無不慕仰雪峰住菴二僧來拜峰見兩手托門放身出云是什麼當央直示恐蹉再提僧云是什麼失見悟問峰低頭歸菴全提向上僧到巖頭頭問什麼處來就事藏鋒僧云嶺南來具實頭云曾到雪峰麼不見來歷所以再勘僧云曾到同前頭云有何言句細辨來源僧舉前話依舊不達他道什麼審其始終僧云他無語低頭歸菴只知供欵不知著賊頭云噫嘆峰不遇知音點僧當面蹉過我當初悔不向他道末後句若向他道天下人不奈雪老何隔身傍注僧至夏末再舉前話請益始終未決頭云何不早問賊打不防僧云未敢容易實供頭云雪峰與我同條生不與我同條死隔身點罰要識末後句只這是竭力提持主意當央直示旨明句裏藏機總結不遇知音切磋琢磨變態誵訛二師謀略活脫無拘葛陂化龍之杖雪老如杖陶家居蟄之梭其僧如梭同條生兮有數同條死兮無多生死明暗且道是誰不會有數會得無多末後句只這是和盤托出風舟載月浮秋水載月同生於天下何偏不有浮秋同死於空前何正不具
